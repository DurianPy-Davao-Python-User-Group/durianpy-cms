services:
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - '27017:27017'

  durianpy-cms:
    build:
      context: ..
      dockerfile: docker/local/Dockerfile
    command: sleep infinity
    volumes:
      - ..:/app:cached
      - /app/node_modules
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=mongodb://mongodb:27017/durianpy-cms
      - PAYLOAD_SECRET="super-secret-key"
    depends_on:
      - mongodb

volumes:
  mongodb_data:
