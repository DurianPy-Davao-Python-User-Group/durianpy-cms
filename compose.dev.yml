services:
  cms:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      args:
        DATABASE_URL: ${DATABASE_URL}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
    ports:
      - '3000:3000'
    develop:
      watch:
        - path: ./src
          target: /app
          action: sync
          ignore:
            - node_modules/
        - path: ./package.json
          action: rebuild
