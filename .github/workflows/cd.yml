name: CMS Continuous Delivery

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read
  security-events: write

jobs:
  deploy:
    name: Build & Production Deploy
    if: github.ref_name == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify CI Workflow Completion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking the status of the latest 'CMS Continuous Integration' run for branch '${{ github.ref_name }}'..."
          conclusion=$(gh run list --workflow "CMS Continuous Integration" --branch "${{ github.ref_name }}" --limit 1 --json conclusion --jq '.[0].conclusion')

          if [ -z "$conclusion" ]; then
            echo "❌ No runs found for the CI workflow on branch '${{ github.ref_name }}'."
            exit 1
          elif [ "$conclusion" != "success" ]; then
            echo "❌ The latest run of the CI workflow on branch '${{ github.ref_name }}' is not successful (status: $conclusion)."
            exit 1
          fi

          echo "✅ The latest CI workflow run completed successfully."

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Get SSM Parameters for Deployment
        id: ssm-param
        uses: Armadillidiid/ssm-get-parameters-action@v1
        with:
          by-path: true
          secret: /durianpy/cms/prod/
          with-decryption: true
          mask-values: true
          recursive: true

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Execute Integration Tests
        env:
          PAYLOAD_SECRET: ${{ steps.ssm-param.outputs.PAYLOAD_SECRET }}
          DATABASE_URL: ${{ steps.ssm-param.outputs.DATABASE_URL }}
        run: npm run test:int

      - name: Build Project
        env:
          ENVIRONMENT: 'production'
          PAYLOAD_SECRET: ${{ steps.ssm-param.outputs.PAYLOAD_SECRET }}
          DATABASE_URL: ${{ steps.ssm-param.outputs.DATABASE_URL }}
          NEXT_PUBLIC_SERVER_URL: ${{ steps.ssm-param.outputs.NEXT_PUBLIC_SERVER_URL }}
          CLOUDFRONT_DISTRIBUTION_DOMAIN: ${{ steps.ssm-param.outputs.CLOUDFRONT_DISTRIBUTION_DOMAIN }}
        run: npm run build

      - name: Sync Static Assets to S3
        run: |
          aws s3 sync .next/static s3://${{ steps.ssm-param.outputs.S3_BUCKET }}/artifacts/_next/static --delete
          aws s3 sync public s3://${{ steps.ssm-param.outputs.S3_BUCKET }}/public --delete

      - name: Fetch Lambda Layer URL
        id: layer-url
        run: |
          LAYER_URL=$(aws lambda get-layer-version-by-arn --arn arn:aws:lambda:ap-southeast-1:044395824272:layer:AWS-Parameters-and-Secrets-Lambda-Extension:61 --query 'Content.Location' --output text)
          echo "url=$LAYER_URL" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/lambda/Dockerfile
          load: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/durianpy-cms-prod:${{ github.sha }}
          secrets: |
            payload_secret=${{ steps.ssm-param.outputs.PAYLOAD_SECRET }}
            database_url=${{ steps.ssm-param.outputs.DATABASE_URL }}
            cloudfront_domain=${{ steps.ssm-param.outputs.CLOUDFRONT_DISTRIBUTION_DOMAIN }}
            s3_bucket=${{ steps.ssm-param.outputs.S3_BUCKET }}
            next_public_server_url=${{ steps.ssm-param.outputs.NEXT_PUBLIC_SERVER_URL }}
          build-args: |
            LAYER_URL=${{ steps.layer-url.outputs.url }}
            AWS_DEFAULT_REGION=ap-southeast-1
            ENVIRONMENT=production

      - name: Codebase Scan (Vulnerabilities & Misconfigurations)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,misconfig'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Image
        if: success()
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/durianpy-cms-prod:${{ github.sha }}

      - name: Summarize Build
        if: always()
        run: |
          echo "### 🚢 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ steps.login-ecr.outputs.registry }}/durianpy-cms-prod:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Security Scan: Results uploaded to the GitHub Security tab." >> $GITHUB_STEP_SUMMARY

      - name: Deploy to AWS Lambda
        if: success()
        run: |
          aws lambda update-function-code \
            --function-name durianpy-cms-prod \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/durianpy-cms-prod:${{ github.sha }}
