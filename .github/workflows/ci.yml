name: CMS Continuous Integration

on:
  pull_request:
    branches:
      - main
      - release/production

permissions:
  id-token: write
  contents: read
  security-events: write
  pull-requests: read

jobs:
  check-labels:
    name: Verify Release Labels
    if: github.base_ref == 'release/production'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')
          echo "PR Labels: $LABELS"

          if echo "$LABELS" | grep -q "release:major"; then
            echo "✅ Found release:major label."
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "✅ Found release:minor label."
          elif echo "$LABELS" | grep -q "release:patch"; then
            echo "✅ Found release:patch label."
          else
            echo "❌ Error: Pull Requests targeting release/production must have one of these labels: release:major, release:minor, or release:patch"
            exit 1
          fi

  validate:
    name: Validation & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Load Mock Environment
        run: cp .env.ci-build .env

      - name: Install Project Dependencies
        run: npm ci --legacy-peer-deps

      - name: Static Analysis (NPM Vulnerability Scan)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          skip-files: '.env.ci-build,.env'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Lint Codebase
        run: npm run lint

      - name: Execute Unit Tests
        run: npm run test:unit

      - name: Run Mock Build
        run: npm run build
