name: CMS Continuous Integration

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  validate:
    name: Validation & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Get SSM Parameters - Key Value Pairs
        id: ssm-param
        uses: Armadillidiid/ssm-get-parameters-action@v1
        with:
          by-path: true
          secret: /durianpy/cms/prod/
          with-decryption: true
          mask-values: true
          recursive: true

      - name: Install Project Dependencies
        run: npm ci --legacy-peer-deps

      - name: Static Analysis (NPM Vulnerability Scan)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Lint Codebase
        run: npm run lint

      - name: Execute Integration Tests
        env:
          PAYLOAD_SECRET: ${{ steps.ssm-param.outputs.PAYLOAD_SECRET }}
          DATABASE_URL: ${{ steps.ssm-param.outputs.DATABASE_URL }}
        run: npm run test:int
