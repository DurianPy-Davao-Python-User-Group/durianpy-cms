name: CMS Promotion to Production

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Promote Main to Release
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Create Auto PR and Merge
        env:
          GH_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
        run: |
          pr_url=$(gh pr create \
            --title "Release: Promote main to production" \
            --body "Automated promotion from main branch" \
            --base release/production \
            --head main || gh pr list --base release/production --head main --json url --jq '.[0].url')

          gh pr merge "$pr_url" --rebase --admin --auto
