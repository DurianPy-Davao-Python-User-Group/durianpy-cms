name: Build and Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validation & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Retrieve Build Secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            APP, durianpy-cms-app-secrets-prod
          parse-json-secrets: true

      - name: Install Project Dependencies
        run: npm ci --legacy-peer-deps

      - name: Static Analysis (NPM Vulnerability Scan)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-fs-report.txt'
          severity: 'CRITICAL,HIGH'

      - name: Publish FS Scan to Summary
        if: always()
        run: |
          echo "### 🛡️ Filesystem Security Scan" >> $GITHUB_STEP_SUMMARY
          if [ -s trivy-fs-report.txt ]; then
            echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
            cat trivy-fs-report.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No high/critical vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Lint Codebase
        run: npm run lint

      - name: Execute Integration Tests
        env:
          PAYLOAD_SECRET: ${{ env.APP_PAYLOAD_SECRET }}
          DATABASE_URL: ${{ env.APP_DATABASE_URL }}
        run: npm run test:int

  deploy:
    name: Build & Production Deploy
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retrieve Build Secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            APP, durianpy-cms-app-secrets-prod
          parse-json-secrets: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          load: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/durianpy-cms-prod:${{ github.sha }}
          secrets: |
            payload_secret=${{ env.APP_PAYLOAD_SECRET }}
            database_url=${{ env.APP_DATABASE_URL }}

      - name: Image Scan (Container Check)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/durianpy-cms-prod:${{ github.sha }}
          format: 'table'
          output: 'trivy-image-report.txt'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Push Image
        if: success()
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/durianpy-cms-prod:${{ github.sha }}

      - name: Summarize Build and Scan
        if: always()
        run: |
          echo "### 🚢 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ steps.login-ecr.outputs.registry }}/durianpy-cms-prod:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

          echo "### 🛡️ Container Image Scan" >> $GITHUB_STEP_SUMMARY
          if [ -s trivy-image-report.txt ]; then
            echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
            cat trivy-image-report.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No high/critical vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi

      # - name: Deploy to AWS Lambda
      #   if: success()
      #   run: |
      #     aws lambda update-function-code \
      #       --function-name durianpy-cms-prod \
      #       --image-uri ${{ steps.login-ecr.outputs.registry }}/durianpy-cms-prod:${{ github.sha }}
