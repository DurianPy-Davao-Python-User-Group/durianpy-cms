name: Build and Push to ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # Required for requesting the JWT for OIDC
  contents: read # Required for checkout

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test:int

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Use the 'cms_ci_role_arn' output from your Terraform apply
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch Secrets and Config from AWS
        id: secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            APP, durianpy-cms-app-secrets-prod

      - name: Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: durianpy-cms-prod
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Use values from Secrets Manager as Build Args
          docker build \
            --build-arg PUBLIC_SERVER_URL=${{ env.INFRA_PUBLIC_SERVER_URL }} \
            --build-arg DATABASE_URL=${{ env.DATABASE_URL }} \
            --build-arg PAYLOAD_SECRET=${{ env.PAYLOAD_SECRET }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY --all-tags

      - name: Update Lambda Function Code (Redeploy)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: durianpy-cms-prod
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # This command tells Lambda to pull the new image digest from ECR
          # We use '|| true' to allow the first build to pass even if the Lambda doesn't exist yet
          echo "Updating Lambda function: durianpy-cms-prod..."
          aws lambda update-function-code \
            --function-name durianpy-cms-prod \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG || echo "Lambda function not found. Skipping update (expected during initial bootstrap)."
